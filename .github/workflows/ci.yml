name: ci

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: diveops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d diveops_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      OPENAI_API_KEY: test-key
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/diveops_test
      DATABASE_URL: postgresql://test:test@localhost:5432/diveops_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm run test:functional
      - run: npm run check
