<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiveOps™ – Offline</title>
  <meta name="theme-color" content="#d4a855" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      opacity: 0.9;
    }
    .title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(180deg, #e6c060, #d4a855, #b8923a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .offline-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: rgba(212, 168, 85, 0.1);
      border: 2px solid rgba(212, 168, 85, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .offline-icon svg {
      width: 28px;
      height: 28px;
      stroke: #d4a855;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .message {
      font-size: 1.125rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
    }
    .description {
      font-size: 0.875rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: #1a1a1a;
      background: linear-gradient(180deg, #e6c060, #d4a855, #b8923a);
      border: 1px solid #a67c32;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .retry-btn:hover {
      opacity: 0.9;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #475569;
    }
    .divider {
      width: 60px;
      height: 1px;
      background: rgba(212, 168, 85, 0.2);
      margin: 1.5rem auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/icon-192.png" alt="DiveOps" class="logo" />
    <h1 class="title">DiveOps™</h1>
    <p class="subtitle">Enterprise Subsea Operations Management</p>
    
    <div class="divider"></div>
    
    <div class="offline-icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    
    <h2 class="message">You're Offline</h2>
    <p class="description">
      It looks like your device has lost its network connection. 
      DiveOps requires an active connection to sync operations data. 
      Please check your connection and try again.
    </p>
    
    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Retry Connection
    </button>
    
    <p class="footer">Precision Subsea Group LLC</p>
  </div>
</body>
</html>
